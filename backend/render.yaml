services:
  - type: web
    name: glow-state-peptides-api
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-netlify-site.netlify.app"
      - key: ADMIN_DEFAULT_USERNAME
        value: "admin"
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: true
      - key: EMAIL_ENABLED
        value: "False"
      - key: DJANGO_DB_PATH
        value: "/var/data/db.sqlite3"
    disk:
      name: sqlite-data
      mountPath: /var/data
      sizeGB: 1
